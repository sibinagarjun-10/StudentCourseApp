<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — StudentPortal</title>
  <link rel="stylesheet" href="../style.css"/>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <a href="index.html" class="back-link">&#8592; Back to Home</a>
      <div class="auth-top">
        <div class="site-label">StudentPortal</div>
        <h1>Welcome Back</h1>
        <p>Login to access your dashboard</p>
      </div>

      <div class="alert alert-error" id="errAlert"></div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="john@example.com"/>
        <div class="field-error" id="emailErr"></div>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="Enter your password" style="padding-right:52px;"/>
          <span class="pw-toggle" id="pwToggle" onclick="togglePw()">Show</span>
        </div>
        <div class="field-error" id="passwordErr"></div>
      </div>

      <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">Login</button>
      <div class="foot-link">Don't have an account? <a href="register.html">Register here</a></div>
    </div>
  </div>
  <script src="../js/api.js"></script>
  <script src="../js/login.js"></script>
</body>
</html>
