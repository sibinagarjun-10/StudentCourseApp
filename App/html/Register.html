<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — StudentPortal</title>
  <link rel="stylesheet" href="../style.css"/>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <a href="index.html" class="back-link">&#8592; Back to Home</a>
      <div class="auth-top">
        <div class="site-label">StudentPortal</div>
        <h1>Create Account</h1>
        <p>Fill in the details below to get started</p>
      </div>

      <div class="alert alert-success" id="okAlert"></div>
      <div class="alert alert-error"   id="errAlert"></div>

      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="John Doe" autocomplete="off"/>
        <div class="field-error" id="nameErr"></div>
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="john@example.com" autocomplete="off"/>
        <div class="field-error" id="emailErr"></div>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="Min 6 chars, letters + numbers" style="padding-right:52px;"/>
          <span class="pw-toggle" id="pwToggle" onclick="togglePw()">Show</span>
        </div>
        <div class="field-error" id="passwordErr"></div>
      </div>

      <button class="btn btn-primary" id="regBtn" onclick="doRegister()">Register</button>
      <div class="foot-link">Already have an account? <a href="login.html">Login here</a></div>
    </div>
  </div>
  <script src="../js/api.js"></script>
  <script src="../js/register.js"></script>
</body>
</html>
